# BToks Model Configuration - Qwen3-VL-2B V1
#
# Pipeline: BToksTokenInjector -> Backbone -> BToksPooling -> Normalize
#
# Note: PEFT/LoRA configuration should be in training config, not here.

type: BToks

modules:
  injector:
    type: BToksTokenInjector
    num_tokens: 4

  backbone:
    type: Qwen3VLBackbone
    model_name_or_path: Qwen/Qwen3-VL-2B-Instruct
    dtype: bfloat16
    attn_implementation: flash_attention_2
    trust_remote_code: true

  pooling:
    type: BToksPooling

  normalize:
    type: Normalize
