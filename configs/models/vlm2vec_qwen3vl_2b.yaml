# VLM2Vec Model Configuration - Qwen3-VL-2B
#
# Pipeline: Backbone -> LastTokenPooling -> Normalize
#
# Note: PEFT/LoRA configuration should be in training config, not here.

type: VLM2Emb

modules:
  backbone:
    type: Qwen3VLBackbone
    model_name_or_path: Qwen/Qwen3-VL-2B-Instruct
    dtype: bfloat16
    attn_implementation: flash_attention_2
    trust_remote_code: true

  pooling:
    type: LastTokenPooling

  normalize:
    type: Normalize
