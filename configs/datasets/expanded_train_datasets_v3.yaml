      - dataset: Screen2Words
        status: train_candidate
        target_stage: stage1_and_stage2_if_ui_targeted
        task_view: ui_screenshot_captioning
      - dataset: WebSRC
        status: train_candidate
        target_stage: stage1_and_stage2_if_ui_targeted
