  video_pre_alignment_and_retrieval:
    rationale: "Use large video-text sources for temporal alignment; Stage 2 should retain only benchmark-related train splits."
    priority:
      - dataset: WebVid-10M
        status: pretrain_only
        target_stage: stage1
        task_view: video_text_pair
      - dataset: InternVid
        status: pretrain_only
        target_stage: stage1
        task_view: video_text_pair
      - dataset: HowTo100M
        status: pretrain_only
        target_stage: stage1
        task_view: video_asr_text_pair
      - dataset: VideoInstruct100K
        status: train_candidate
        target_stage: stage1
        task_view: video_instruction
      - dataset: LLaVA-OneVision
        status: train_candidate
        target_stage: stage1
        task_view: image_video_instruction
      - dataset: OpenGVLab/VideoChat2-IT-clean
        status: partial_enabled_v2_remaining_candidate
        target_stage: stage1_and_stage2_sampled
        task_view: split_video_instruction_family
        source_repos:
          - OpenGVLab/VideoChat2-IT
          - byminji/VideoChat2-IT-clean
        total_valid_samples: 877489
        split_policy: separate_subsets
        media_policy: media_backed_subsets_enabled_in_v2_remaining_subsets_require_original_video_sources
        notes: "The v2 VideoChat2-IT entry enables only media-backed rows from next_qa, youcook2, ssv2, k710, and videochatgpt; remaining subsets stay audit-only."
        subsets:
          - name: textvr
            task_view: video_caption
            source_family: TextVR
            valid_samples: 39648
            overlap_with_existing: no_known_current_overlap
            decision: keep_candidate
          - name: youcook2
            task_view: video_caption
            source_family: YouCook2
            valid_samples: 8700
            overlap_with_existing: duplicates_youcook2_train_family
            decision: partial_enabled_media_backed_rows
          - name: k710
            task_view: video_classification
            source_family: Kinetics
            valid_samples: 38977
            overlap_with_existing: high_overlap_risk_with_kinetics700_train
            decision: partial_enabled_media_backed_rows
          - name: ssv2
            task_view: video_classification
            source_family: Something-Something-V2
            valid_samples: 40000
            overlap_with_existing: duplicates_ssv2_train_family
            decision: enabled_media_backed_rows
          - name: videochat2
            task_view: video_conversation
            source_family: InternVid
            valid_samples: 9584
            overlap_with_existing: no_known_current_overlap
            decision: keep_candidate
          - name: videochatgpt
            task_view: video_conversation
            source_family: ActivityNet
            valid_samples: 13303
            overlap_with_existing: possible_activitynet_captions_or_activitynetqa_overlap
            decision: enabled_media_backed_rows
          - name: next_qa
            task_view: video_reasoning
            source_family: NExT-QA
            valid_samples: 34132
            overlap_with_existing: duplicates_nextqa_train
            decision: enabled_media_backed_rows
          - name: clevrer_qa
            task_view: video_reasoning
            source_family: CLEVRER
            valid_samples: 40000
            overlap_with_existing: no_known_training_root_overlap_but_mvbench_eval_family_overlap_risk
            decision: keep_candidate_after_mvbench_overlap_audit
          - name: clevrer_mc
            task_view: video_reasoning
            source_family: CLEVRER
            valid_samples: 40000
            overlap_with_existing: no_known_training_root_overlap_but_mvbench_eval_family_overlap_risk
            decision: keep_candidate_after_mvbench_overlap_audit
          - name: ego_qa
            task_view: egocentric_video_qa
            source_family: EgoQA
            valid_samples: 7797
            overlap_with_existing: no_known_current_overlap_but_egoschema_proxy
            decision: keep_candidate_without_ego4d_full
          - name: tgif_frame_qa
            task_view: video_vqa
            source_family: TGIF
            valid_samples: 39149
            overlap_with_existing: no_known_training_root_overlap_but_mvbench_eval_family_overlap_risk
            decision: keep_candidate_after_mvbench_overlap_audit
          - name: tgif_transition_qa
            task_view: video_vqa
            source_family: TGIF
            valid_samples: 52696
            overlap_with_existing: no_known_training_root_overlap_but_mvbench_eval_family_overlap_risk
            decision: keep_candidate_after_mvbench_overlap_audit
          - name: webvid
            task_view: video_caption
            source_family: WebVid
            valid_samples: 399740
            overlap_with_existing: possible_sharegptvideo_or_llavahound_overlap
            decision: stage1_sampled_only_after_dedup
          - name: videochat
            task_view: video_caption
            source_family: WebVid
            valid_samples: 6889
