# ============================================================================
# Expanded training dataset v3 Stage 1 catalog layer
# ============================================================================
#
# - Inherits the v2 full-training mixture.
# - Adds a non-runtime `_stage1_candidates` catalog for future Stage 1 dataset
#   conversion work.
# - `_stage1_candidates` entries are documentation metadata only. The combined
#   dataset builder ignores underscore-prefixed keys because they do not define
#   a registry `type`.
# - Blocked, license-sensitive, or eval-only entries must stay catalog-only
#   until they have public provenance and a runtime-safe loader.
#
# Stage 1 is intended for text bootstrapping and public pretraining-style data.
# Stage 2 remains the MMEB-V2-aligned multimodal training mixture.

_inherit_: ./expanded_train_datasets_v2.yaml

_stage1_candidates:
  text_bootstrapping:
    rationale: "Use text-only retrieval and entailment pairs to strengthen the base embedding space before multimodal alignment."
    priority:
      - dataset: SNLI
        status: train_candidate
        target_stage: stage1
        task_view: text_entailment
      - dataset: MNLI
        status: train_candidate
        target_stage: stage1
        task_view: text_entailment
      - dataset: AllNLI
        status: train_candidate
        target_stage: stage1
        task_view: text_entailment
      - dataset: MSMARCO Passage
        status: train_candidate
        target_stage: stage1
        task_view: text_retrieval
      - dataset: Natural Questions
        status: train_candidate
        target_stage: stage1
        task_view: text_qa_retrieval
      - dataset: HotpotQA
        status: train_candidate
        target_stage: stage1
        task_view: text_multi_hop_retrieval

  image_text_pre_alignment:
    rationale: "Use large image-text pair sources for coarse cross-modal alignment; do not add raw full web-scale sources to Stage 2."
    priority:
      - dataset: CC12M
        status: pretrain_only
        target_stage: stage1
        task_view: image_text_pair
      - dataset: CC3M
        status: pretrain_only
        target_stage: stage1
        task_view: image_text_pair
      - dataset: PixelProse
        status: pretrain_only
        target_stage: stage1
        task_view: image_text_pair
      - dataset: ShareGPT4V
        status: pretrain_only
        target_stage: stage1
        task_view: image_text_pair
      - dataset: Recap-DataComp-1B
        status: pretrain_only
        target_stage: stage1
        task_view: image_text_pair
      - dataset: DataComp-1B
        status: pretrain_only
        target_stage: stage1
        task_view: image_text_pair
      - dataset: LAION-COCO
        status: pretrain_only
        target_stage: stage1
        task_view: image_text_pair
      - dataset: LAION-400M
        status: pretrain_only
        target_stage: stage1
        task_view: image_text_pair
      - dataset: LAION-5B
        status: pretrain_only
        target_stage: stage1
        task_view: image_text_pair
      - dataset: COYO-700M
        status: pretrain_only
        target_stage: stage1
        task_view: image_text_pair
      - dataset: WIT
        status: pretrain_only
        target_stage: stage1
        task_view: multilingual_image_text_pair
      - dataset: RedCaps
        status: pretrain_only
        target_stage: stage1
        task_view: image_text_pair
      - dataset: OpenImages V7
        status: pretrain_only
        target_stage: stage1
        task_view: image_text_pair_or_detection_labels

  image_text_retrieval_and_cir:
    rationale: "Prioritize retrieval-shaped data and composed image retrieval because their objectives match embedding training."
    priority:
      - dataset: Flickr30K
        status: train_candidate
        target_stage: stage1
        task_view: image_text_retrieval
      - dataset: LaSCo
        status: formal_candidate
        target_stage: stage1_and_stage2
        task_view: composed_image_retrieval
      - dataset: SNLI-VE
        status: formal_candidate
        target_stage: stage1_and_stage2
        task_view: visual_entailment
      - dataset: MagicLens
        status: synthetic_candidate
        target_stage: stage1
        task_view: composed_image_retrieval
      - dataset: MegaPairs
        status: synthetic_candidate
        target_stage: stage1
        task_view: composed_image_retrieval
      - dataset: mmE5 synthetic
        status: synthetic_candidate
        target_stage: stage1_and_stage2_sampled
        task_view: multimodal_retrieval
      - dataset: GME Wikipedia synthetic
        status: synthetic_candidate
        target_stage: stage1
        task_view: knowledge_image_text_retrieval

  fine_grained_image_retrieval:
    rationale: "Use metric-learning datasets to improve image-image discrimination; sample carefully to avoid over-specializing Stage 2."
    priority:
      - dataset: Stanford Online Products
        status: formal_candidate
        target_stage: stage1_and_stage2_sampled
        task_view: image_image_retrieval
      - dataset: DeepFashion In-Shop
        status: formal_candidate
        target_stage: stage1_and_stage2_sampled
        task_view: image_image_retrieval
      - dataset: Google Landmarks v2
        status: train_candidate
        target_stage: stage1
        task_view: image_image_retrieval
      - dataset: iNaturalist 2018
        status: train_candidate
        target_stage: stage1
        task_view: fine_grained_classification_or_retrieval
      - dataset: CUB-200-2011
        status: train_candidate
        target_stage: stage1
        task_view: fine_grained_classification_or_retrieval
      - dataset: Stanford Cars
        status: train_candidate
        target_stage: stage1
        task_view: fine_grained_classification
      - dataset: Oxford Pets
        status: train_candidate
        target_stage: stage1
        task_view: fine_grained_classification
      - dataset: Oxford Flowers 102
        status: train_candidate
        target_stage: stage1
        task_view: fine_grained_classification
      - dataset: FGVC-Aircraft
        status: train_candidate
        target_stage: stage1
        task_view: fine_grained_classification

  visual_grounding:
    rationale: "Use region-level data to improve local alignment, crop matching, and referring-expression retrieval."
    priority:
      - dataset: RefCOCO+
        status: train_candidate
        target_stage: stage1
        task_view: visual_grounding
      - dataset: RefCOCOg
        status: train_candidate
        target_stage: stage1
        task_view: visual_grounding
      - dataset: Flickr30K Entities
        status: train_candidate
        target_stage: stage1
        task_view: phrase_grounding
      - dataset: Visual Genome regions
        status: train_candidate
        target_stage: stage1
        task_view: region_description_matching
      - dataset: Objects365
        status: train_candidate
        target_stage: stage1
        task_view: detection_label_or_region_matching

  visual_reasoning_and_vqa:
    rationale: "Use reasoning and QA data as matching pairs only after defining answer selection, negatives, and overlap keys."
    priority:
      - dataset: NLVR2
        status: train_candidate
        target_stage: stage1
        task_view: visual_reasoning_matching
      - dataset: VCR
        status: train_candidate
        target_stage: stage1
        task_view: visual_commonsense_qa
      - dataset: VQAv2
        status: train_candidate
        target_stage: stage1
        task_view: visual_qa
      - dataset: Encyclopedic-VQA
        status: train_candidate
        target_stage: stage1
