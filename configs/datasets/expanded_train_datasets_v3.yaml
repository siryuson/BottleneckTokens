      - dataset: AI2D
        status: train_candidate
        target_stage: stage1
        task_view: diagram_qa
      - dataset: OCR-VQA
        status: train_candidate
        target_stage: stage1
        task_view: ocr_visual_qa

  visual_document_and_ui:
    rationale: "Use high-quality document/page/UI datasets for Stage 1, then keep only directly relevant subsets in Stage 2."
    priority:
      - dataset: Docmatix
        status: train_candidate
        target_stage: stage1
        task_view: document_qa
      - dataset: ScreenQA
        status: train_candidate
        target_stage: stage1_and_stage2_if_ui_targeted
