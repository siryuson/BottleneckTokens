colpali_train_set:
  # Full QA view over the same upstream source as the RAG source views below.
  # Raw schema: image / image_filename / query / answer / options / source /
  # page / model / prompt / answer_type.
  # Runtime view (`vidore_train`, archive parser = vidore_fixoptions_v2):
  #   query uses the document page image plus question/options;
  #   positive resolves the answer letter to the answer text when options exist.
  # final query: "<|image_pad|>\\n{query} Options: {options}"
  # final positive: "{resolved_answer}"
  # final negative: ""
  # example query: "<|image_pad|>\nComparing panels a, b, c, and d, which statement best describes the data variance? Options: ['A. The variance of the data decreases from panel a to panel d.', 'B. The variance of the data increases from panel a to panel d.', 'C. The data presents no variance in any of the panels.', 'D. The variance of the data is inconsistent across the panels.', '-']"
  # example positive: "The variance of the data is inconsistent across the panels."
  # example negative: ""
  type: vidore_train
  path: ${oc.env:VLM2EMB_DATA_ROOT,./data}/vidore_colpali_train_set
  transform:
    query:
      visual_token_placement: own_line
      trailing_newline: preserve
    positive:
      trailing_newline: preserve
    negative:
      empty: empty_multimodal_input
  # samples: 118195
  weight: 1

colpali_train_set_arxiv_qa:
  # RAG retrieval view derived from the same upstream source as the full QA
  # view above. It discards answer supervision and trains text-query to
  # document-page retrieval.
  # final query: "{text}\\n"
  # final positive: "<|image_pad|>\\n{text}\\n"
  # final negative: ""
  # example query: "Find a document image that matches the given query: Comparing panels a, b, c, and d, which statement best describes the data variance?\n"
  # example positive: "<|image_pad|>\nUnderstand the content of the provided document image.\n"
  # example negative: ""
  # transform defaults supported by `vidore_rag_train`:
  #   transform.query.instruction
  #   transform.query.instruction_body_separator
  #   transform.query.trailing_newline
  #   transform.positive.instruction
  #   transform.positive.visual_token_placement
  #   transform.positive.trailing_newline
  type: vidore_rag_train
  path: ${oc.env:VLM2EMB_DATA_ROOT,./data}/vidore_rag_arxiv_qa
  transform: &vidore_rag_train_transform_defaults
    query:
      instruction: "Find a document image that matches the given query:"
      instruction_body_separator: space
      trailing_newline: ensure_single
    positive:
      instruction: "Understand the content of the provided document image."
      visual_token_placement: own_line
      trailing_newline: ensure_single
    negative:
      empty: empty_multimodal_input
  # samples: 9949
  weight: 1.2

