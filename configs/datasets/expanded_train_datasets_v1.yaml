# ============================================================================
# Expanded Public Training Dataset Template
# ============================================================================
#
# - This file is the public expanded training mixture used by VLM2Vec presets.
# - Each enabled top-level entry is a registry-buildable dataset config.
# - `type` selects the dataset loader, and `path` resolves against
#   `VLM2EMB_DATA_ROOT` unless an entry has its own public root variable.
# - `weight` uses a conservative temperature mix: image / video / visdoc is
#   roughly 46.3 / 17.2 / 31.8 after moving K700 to the v2 expansion
#   workstream. Entries inside each modality use samples^0.78, rounded to one
#   decimal. With
#   `all_exhausted`, this keeps the expected epoch below 15M rows. GQA
#   uses its balanced split by default; the 14.3M-row train_all split remains
#   available as an explicit full-source view.
# - `subset` keeps the storage split explicit so dataset provenance can be
#   audited without executing the loader.
# - `# samples:` records the count for the selected split after MMEB-V2
#   evaluation-leak filtering and runtime transform policy.
#
# - enabled entries: 62
# - total samples: 6,466,803
# - MMEB train subsets: 1,068,469
# - ViDoRe full/source views: 236,390
# - VisRAG source views: 122,752
# - LLaVA-Hound views: 858,502
# - expanded standalone datasets: 4,180,690
#
# - MMEB train subsets -> `mmeb_train`
# - ViDoRe full/source views -> `vidore_train` / `vidore_rag_train`
# - VisRAG single subsets -> `visrag_train`
# - LLaVA-Hound caption / video retrieval / QA -> `llavahound_train`
# - SmthSmthV2 video classification -> `ssv2_train`
#

