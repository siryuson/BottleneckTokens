# MMEB Training Dataset Configuration
# Base layer for dataset variants
# Public MMEB training mixture used by the BToks reproduction presets.
# Naming Convention: Use `type` for registry building (per architecture.md)
#
# ============================================================================
# MMEB Datasets (type: mmeb_train)
# Runtime contract:
# - Lance tables store source fields; Dataset.__getitem__ applies the configured
#   transform into query, positive, and negative retrieval fields.
# - Classification-like tasks render the image side with `<|image_pad|>` and
#   use label text as the positive side.
# - Text-only entries intentionally omit visual tokens so token counts remain
#   compatible with text retrieval baselines.
# - The `mmeb_train` loader owns subset parsing and specific render overrides
#   such as WebQA and VisDial prompt handling.
# ============================================================================

ImageNet_1K:
  # final query: "<|image_pad|>\\n{text}\\n"
  # final positive: "{text}\\n"
  # final negative: ""
  # example query: "<|image_pad|>\nRepresent the given image for classification\n"
  # example positive: "plane, carpenter's plane, woodworking plane\n"
  # example negative: ""
  type: mmeb_train
  path: ${oc.env:VLM2EMB_MMEB_TRAIN_ROOT,./data/MMEB-train}
  subset: ImageNet_1K
  transform:
    query:
      visual_token_placement: own_line
      trailing_newline: ensure_single
    negative:
      empty: empty_multimodal_input
  weight: 1

