# ================================================================
# BToks Preset - Qwen2-VL-2B
# ================================================================
# Usage
#   python scripts/train.py configs/presets/btoks_qwen2vl_2b_v1.yaml
#   python scripts/train.py configs/presets/btoks_qwen2vl_2b_v1.yaml \
#       train.args.run_name=my_experiment
#
# Optional resume
#   train.args.resume_from_checkpoint=/path/to/checkpoint
# ================================================================

# ==================== Output
output_base: ./output

processor:
  type: qwen2_vl
  processor_name: Qwen/Qwen2-VL-2B-Instruct
  # Keep the boundary-wrapped visual token form as the production default.
  # Flip this only for tightly scoped regression experiments when comparing
  # processor behavior against historical checkpoints or archived eval runs.
  wrap_visual_tokens_with_boundaries: true
  image_min_pixels: 3136       # 28*28*4
  image_max_pixels: 1003520    # 28*28*1280
  video_min_pixels: 3136       # 28*28*4
  video_max_pixels: 602112    # 28*28*768

model:
  _inherit_: ../models/btoks_qwen2vl_2b_v1.yaml

peft:
  _inherit_: ../peft/lora_default.yaml

eval:
  type: mmeb
  data_path: ${oc.env:VLM2EMB_MMEB_V2_ROOT,./data/MMEB-V2}
  batch_size: 8
  # MMEB eval creates many short-lived query/candidate DataLoaders.
  # With Lance multiprocess loading this path must stay on spawn, and
  # higher worker counts pay a large cold-start penalty on every subset.
  # Keep the preset at 0 so the default real eval command remains responsive.
  num_workers: 0

train:
  dataset:
    type: combined
    datasets:
      _inherit_: ../datasets/btoks_mmeb_train.yaml

  collator:
    type: training

  trainer:
    type: btoks_trainer

  args:
    _inherit_: ../training/btoks_base.yaml
    output_dir: ${output_base}/${train.args.run_name}
    run_name: btoks_qwen2vl_2b_v1
    per_device_train_batch_size: 128
    gc_chunk_size: 8
    eval_strategy: steps
    eval_steps: 500
    metric_for_best_model: eval_overall
    greater_is_better: true
    ddp_find_unused_parameters: true
    dataloader_drop_last: true
