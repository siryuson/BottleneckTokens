# VLM2Vec Preset - Qwen2-VL-7B

output_base: ./output

model:
  _inherit_: ../models/vlm2vec_qwen2vl_7b.yaml

peft:
  _inherit_: ../peft/lora_default.yaml

processor:
  type: qwen2_vl
  processor_name: Qwen/Qwen2-VL-7B-Instruct
  image_min_pixels: 3136
  image_max_pixels: 1003520
  video_min_pixels: 3136
  video_max_pixels: 602112

eval:
  type: mmeb
  data_path: ${oc.env:VLM2EMB_MMEB_V2_ROOT,./data/MMEB-V2}
  batch_size: 4
  # MMEB eval repeatedly rebuilds short-lived query/candidate DataLoaders.
  # With Lance multiprocess loading this path must stay on spawn, so higher
  # worker counts mostly amplify per-subset cold-start latency.
  num_workers: 0

train:
  dataset:
    type: combined
    datasets:
      _inherit_: ../datasets/mmeb_train_optimized.yaml

  collator:
    type: training

  trainer:
    type: vlm2vec_trainer

  args:
    _inherit_: ../training/vlm2vec_base.yaml
    output_dir: ${output_base}/${train.args.run_name}
    run_name: vlm2vec_qwen2vl_7b
    per_device_train_batch_size: 128
    gc_chunk_size: 4
    eval_strategy: steps
    eval_steps: 500
    metric_for_best_model: eval_overall
    greater_is_better: true
    ddp_find_unused_parameters: true
    dataloader_drop_last: true
