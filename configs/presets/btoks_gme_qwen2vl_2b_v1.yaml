# ================================================================
# BToks + GME-style Preset - Qwen2-VL-2B V1
# ================================================================
# Keeps the BToks model/trainer path while applying the same GME-style
# query/corpus instruction policy used by the dense GME baseline.
# ================================================================

output_base: ./output

processor:
  type: qwen2_vl
  processor_name: Qwen/Qwen2-VL-2B-Instruct
  wrap_visual_tokens_with_boundaries: true
  image_min_pixels: 3136
  image_max_pixels: 1003520
  video_min_pixels: 3136
  video_max_pixels: 602112

model:
  _inherit_: ../models/btoks_qwen2vl_2b_v1.yaml

peft:
  _inherit_: ../peft/lora_default.yaml

eval:
  type: mmeb
  data_path: ${oc.env:VLM2EMB_MMEB_V2_ROOT,./data/MMEB-V2}
  batch_size: 8
  num_workers: 0

train:
  dataset:
    type: combined
    datasets:
      _inherit_: ../datasets/btoks_mmeb_train.yaml

  collator:
    type: training
    instruction_policy:
      enabled: true
      query_instruction: "Represent the query for retrieving relevant multimodal candidates."
      corpus_instruction: ""
      template: "{instruction}\n{text}"
    use_explicit_negatives: false
    hard_negative_mining: false

  trainer:
    type: btoks_trainer

  args:
    _inherit_: ../training/btoks_base.yaml
    output_dir: ${output_base}/${train.args.run_name}
    run_name: btoks_gme_qwen2vl_2b_v1_no_mining
    temperature: 0.03
    generation_loss_weight: 0.1
    per_device_train_batch_size: 128
    gc_chunk_size: 8
    eval_strategy: steps
    eval_steps: 500
    metric_for_best_model: eval_overall
    greater_is_better: true
    ddp_find_unused_parameters: true
    dataloader_drop_last: true
